<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <title>Dashboard</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      background: linear-gradient(120deg, #4f46e5, #9333ea);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:92%;
      height:92vh;
      background:white;
      border-radius:15px;
      display:flex;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      overflow:hidden;
    }

    /* LEFT - DASHBOARD */
    .left{
      width:70%;
      background:#111827;
      color:white;
      padding:30px;
      overflow-y:auto;
    }

    .left h2{
      margin-bottom:20px;
      border-bottom:1px solid gray;
      padding-bottom:10px;
    }

    /* BOARDS GRID */
    #membersList{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
      margin-top:20px;
    }

    /* BOARD CARD */
    .board-card{
      background:#374151;
      padding:20px;
      width:220px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.3);
      transition:0.3s;
    }

    .board-card:hover{
      transform:scale(1.05);
      background:#4b5563;
    }

    .board-card h3{
      margin-bottom:15px;
      color:#f9fafb;
    }

    .board-card button{
      padding:8px 12px;
      background:#6366f1;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .board-card button:hover{
      background:#4f46e5;
    }

    /* RIGHT - ADD BOARD */
    .right{
      width:30%;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f3f4f6;
    }

    .invite-box{
      width:80%;
    }

    .invite-box h2{
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:6px;
      margin-top:10px;
      font-size:15px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:20px;
      background:#4f46e5;
      color:white;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#4338ca;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- LEFT - BOARDS -->
  <div class="left">
    <h2>Dashboard</h2>
    <div id="membersList">
      Loading...
    </div>
  </div>

  <!-- RIGHT - ADD BOARD -->
  <div class="right">
    <div class="invite-box">
      <h2>Add Board</h2>
      <input type="text" placeholder="Enter Board Title" id="member">
      <button onclick="invite()">Add Board</button>
    </div>
  </div>

</div>

<script>
async function invite(){
  await axios.post("http://localhost:3000/board",
  {
    title: document.getElementById('member').value,
    organizationId: localStorage.getItem('organizationId')
  },
  {
    headers:{
      Authorization: "Bearer " + localStorage.getItem('token')
    }
  });

  starting();
}

async function starting(){
  const response = await axios.get("http://localhost:3000/boards",{
    params:{
      organizationId: localStorage.getItem('organizationId')
    },
    headers:{
      token: localStorage.getItem('token')
    }
  });

  const data = response.data.Board;
  const container = document.getElementById('membersList');
  container.innerHTML = "";

  for(let i = 0; i < data.length; i++){
    const div = document.createElement("div");
    div.className = "board-card";
    div.innerHTML = `
      <h3>${data[i].title}</h3>
      <button onclick="openBoard(${data[i].id})">Open</button>
    `;
    container.appendChild(div);
  }
}

function openBoard(boardId){
  localStorage.setItem("boardId", boardId);
  window.location = "/issues";
}

starting();
</script>

</body>
</html>
