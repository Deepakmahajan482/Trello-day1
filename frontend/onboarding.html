<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <title>Organization</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(120deg, #4f46e5, #9333ea);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    #container{
      background:white;
      padding:40px;
      border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      width:350px;
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    input, select{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:14px;
    }

    input:focus, select:focus{
      outline:none;
      border-color:#4f46e5;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      background:#4f46e5;
      color:white;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#4338ca;
    }

    .divider{
      text-align:center;
      margin:15px 0;
      color:gray;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div id="container">

    <h2>Create Organization</h2>
    <input type="text" placeholder="Enter Title" id="title">
    <input type="text" placeholder="Enter Description" id="description">
    <button onclick="create()">Create Organization</button>

    <div class="divider">OR</div>

    <h2>Select Organization</h2>
    <select id="selection" onchange="goToOrg()">
      <option value="">Select Organization</option>
    </select>

  </div>

  <script>
    async function selectOrg(){
      const response = await axios.get("http://localhost:3000/optionsOrg", {
        headers:{
          token:localStorage.getItem('token')
        }
      });

      const data = response.data.organizationData;
      const select = document.getElementById("selection");

      for(let i = 0; i < data.length; i++){
        const option = document.createElement("option");
        option.value = data[i]._id;
        option.textContent = data[i].title;
        select.appendChild(option);
      }
    }

    async function create(){
      const title = document.getElementById("title").value;
      const description = document.getElementById("description").value;

      const response = await axios.post("http://localhost:3000/organization",{
        title,
        description
      },{
        headers:{
         token: localStorage.getItem('token')
        }
      });

      localStorage.setItem("organizationId", response.data.id);
      window.location = "/org";
    }

    function goToOrg(){
      const orgId = document.getElementById("selection").value;
      localStorage.setItem("organizationId", orgId);
      window.location = "/org";
    }

    selectOrg();
  </script>
</body>
</html>
