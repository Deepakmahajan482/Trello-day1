<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <title>Document</title>
  <style>
   body{
      margin:0;
      padding:0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(120deg, #4f46e5, #9333ea);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    #container{
      background:white;
      padding:40px;
      border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      width:320px;
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:14px;
    }

    input:focus{
      outline:none;
      border-color:#4f46e5;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:20px;
      background:#4f46e5;
      color:white;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#4338ca;
    }

    #message{
      text-align:center;
      margin-top:15px;
      color:green;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="form">
      <h1>Create the Organization</h1>
      <input type="text" placeholder="Enter the Title" id="title">
     <input type="text" placeholder="Enter the Description" id="description">
     <button onclick="create()">Create org</button>
    </div>
  </div>
  <script>
    async function create(){
      const title=document.getElementById("title").value;
      const description=document.getElementById("description").value;
      const response=await axios.post("http://localhost:3000/organization",{
        title,
        description
      },
    {
      headers:{
        token:localStorage.getItem('token')
      }
    });
    window.location="/organization"
    }
  </script>
</body>
</html>
